food_identification_task:
  description: |
    Analyze the uploaded food image and identify all food items present.
    For each item, describe:
    1. Name of the food
    2. Cooking method (if applicable)
    3. Estimated portion size
    4. Key ingredients visible

    Image path: {image_path}

  expected_output: |
    A detailed list of all identified food items with descriptions

food_nutrition_task:
  description: |
    Based on the identified food items from the previous task, calculate:
    1. Estimated calories for each item
    2. Macronutrient breakdown (protein, carbs, fat)
    3. Total calorie count
    4. Any notable nutritional highlights or concerns

  expected_output: |
    Complete nutritional breakdown with calorie estimates

daily_summary_task:
  description: |
    Compile all analyzed food items into a daily meal summary.
    Include:
    1. Total calories for the meal
    2. Meal composition analysis
    3. General health assessment based on the meal

  expected_output: |
    A comprehensive daily meal summary and health insights
